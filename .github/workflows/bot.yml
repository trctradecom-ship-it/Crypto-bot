name: EMA Crypto Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"   # runs every 15 minutes

concurrency:
  group: ema-crypto-bot
  cancel-in-progress: true   # ✅ cancels previous run if still running

jobs:
  run-bot:
    runs-on: ubuntu-latest

    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        run: python bot.py
